<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - GSTU Science Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <universal-header></universal-header>

    <div class="section-container">
        <h2 class="section-title">Photo Gallery</h2>
        <p class="section-subtitle">Moments captured during our collaborative workshops, design sessions, and competitive representations.</p>

        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&w=500&q=80" alt="Chemistry Prototyping">
                <div class="gallery-caption">Chemistry Prototyping Workshop</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e?auto=format&fit=crop&w=500&q=80" alt="Robotics Lab">
                <div class="gallery-caption">Robotics Core Lab Assembly</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=500&q=80" alt="Astronomy Session">
                <div class="gallery-caption">Astronomy Night Setup</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=500&q=80" alt="Coding Hackathon">
                <div class="gallery-caption">Annual Software Hackathon</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=500&q=80" alt="Team Brainstorming">
                <div class="gallery-caption">Weekly Executive Committee Briefing</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1531482615713-2afd69097998?auto=format&fit=crop&w=500&q=80" alt="Award Distribution">
                <div class="gallery-caption">Project Competition Awards</div>
            </div>
        </div>
    </div>

    <universal-footer></universal-footer>

    <script src="main.js"></script>
</body>
</html>
