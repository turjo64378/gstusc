<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - GSTU Science Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <universal-header></universal-header>

    <div class="section-container">
        <h2 class="section-title">Get in Touch</h2>
        <p class="section-subtitle">Have questions about registration, scheduling, or equipment? Send us an inquiry message directly.</p>
        
        <div style="text-align: center; margin-bottom: 2rem; font-size: 1.1rem; color: #555;">
            <p>📍 <strong>Location:</strong> Room 402, Student Center, GSTU Campus</p>
            <p>✉️ <strong>Official Email:</strong> contact@gstuscienceclub.edu</p>
        </div>

        <form class="contact-form" action="#" method="POST" onsubmit="event.preventDefault(); alert('Modular Form Submission Successful!');">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="email">Student Email Address</label>
            <input type="email" id="email" name="email" placeholder="student_id@gstu.edu" required>

            <label for="message">Inquiry / Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Type your query or project registration request here..." required></textarea>

            <button type="submit" class="btn" style="width: 100%;">Send Message</button>
        </form>
    </div>

    <universal-footer></universal-footer>

    <script src="main.js"></script>
</body>
</html>
